
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHALANX // Threat Feed</title>
    
    <!-- Google Fonts for better typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            --bg-color: #0a0b10;
            --sidebar-bg: #0d0f16;
            --accent-primary: #00ff9d; /* Matrix/Cyber Green */
            --accent-secondary: #00d4ff; /* Tech Blue */
            --text-main: #e0e6ed;
            --text-muted: #8892b0;
            --border-color: #1e293b;
            --callout-bg: rgba(0, 212, 255, 0.05);
            --callout-border: #00d4ff;
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            line-height: 1.6;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- SIDEBAR --- */
        nav {
            width: 320px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            z-index: 10;
            overflow-y: auto;
        }

        .brand {
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--accent-primary);
            margin-bottom: 3rem;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand::before {
            content: "";
            display: inline-block;
            width: 12px;
            height: 12px;
            background-color: var(--accent-primary);
            box-shadow: 0 0 10px var(--accent-primary);
            border-radius: 2px;
        }

        nav h3 {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 1.5rem;
        }

        nav ul {
            list-style: none;
        }

        nav li {
            margin-bottom: 0.75rem;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            transition: all 0.2s ease;
            display: block;
            padding: 0.5rem;
            border-radius: 4px;
            border-left: 2px solid transparent;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        nav a:hover, nav a.active {
            background: rgba(0, 255, 157, 0.05);
            color: var(--accent-primary);
            border-left: 2px solid var(--accent-primary);
            padding-left: 1rem;
        }

        /* --- MAIN CONTENT --- */
        main {
            flex-grow: 1;
            padding: 4rem 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .header-meta {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--accent-primary);
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            opacity: 0.8;
        }

        #status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #status::before {
            content: "";
            width: 8px;
            height: 8px;
            background: var(--accent-primary);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 157, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 157, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 157, 0); }
        }

        /* --- MARKDOWN STYLING --- */
        #markdown-content {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #markdown-content h1 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            color: #fff;
            font-weight: 700;
        }

        #markdown-content h2 {
            font-size: 1.5rem;
            margin: 2.5rem 0 1rem;
            color: var(--accent-primary);
            font-family: var(--font-mono);
        }

        #markdown-content p {
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            color: var(--text-main);
            font-weight: 300;
        }

        #markdown-content code {
            font-family: var(--font-mono);
            background: #1a1c23;
            color: var(--accent-secondary);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
        }

        #markdown-content pre {
            background: #1a1c23;
            padding: 1.5rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 2rem 0;
            border: 1px solid var(--border-color);
        }

        #markdown-content pre code {
            background: transparent;
            padding: 0;
            color: #d1d5db;
        }

        /* --- PHALANX CALLOUT --- */
        .phalanx-callout {
            background-color: var(--callout-bg);
            border-left: 4px solid var(--callout-border);
            padding: 2rem;
            margin: 3rem 0;
            border-radius: 0 8px 8px 0;
            position: relative;
            overflow: hidden;
        }

        .phalanx-callout::after {
            content: "INTEL_ANALYSIS";
            position: absolute;
            top: 0.5rem;
            right: 1rem;
            font-family: var(--font-mono);
            font-size: 0.6rem;
            color: var(--accent-secondary);
            opacity: 0.3;
            letter-spacing: 2px;
        }

        .phalanx-callout strong:first-child {
            display: block;
            color: var(--accent-secondary);
            font-family: var(--font-mono);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            nav {
                width: 100%;
                height: auto;
                position: relative;
                padding: 1.5rem;
            }
            .brand { margin-bottom: 1.5rem; }
            main { padding: 2rem 1.5rem; }
            #markdown-content h1 { font-size: 1.8rem; }
        }

        /* Subtle Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 100, 0.02));
            z-index: 100;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <nav>
        <div class="brand">PHALANX</div>
        
        <h3>ARCHIVE_LOGS</h3>
        <ul id="post-list">
            <!-- Populated dynamically -->
            <li style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-muted);">[ SCANNING REPOSITORY... ]</li>
        </ul>
    </nav>
   
    <main>
        <div class="header-meta">
            <div id="status">STATUS: CONNECTED</div>
            <div id="node">NODE: PHALANX-CCS</div>
        </div>
        
        <div id="markdown-content">
            <p style="font-family: var(--font-mono); color: var(--accent-primary);">[ INITIALIZING DATA STREAM... ]</p>
        </div>
    </main>

    <script>
        // CONFIGURATION: Update these to match your GitHub repository
        const CONFIG = {
            owner: 'Phalanx-CCS', // e.g., 'johndoe'
            repo: 'threat_feed.github.io',       // e.g., 'phalanx-feed'
            branch: 'main'
        };

        // Helper to format filename to sidebar label
        // Pattern: phalanx_intel_20260407_1248.md -> > 2026-04-07 // DAILY_INTEL
        function formatFilename(filename) {
            const dateMatch = filename.match(/(\d{4})(\d{2})(\d{2})/);
            if (dateMatch) {
                const [_, year, month, day] = dateMatch;
                return `> ${year}-${month}-${day} // DAILY_INTEL`;
            }
            return `> ${filename.replace('.md', '')}`;
        }

        async function fetchPostList() {
            const postListElement = document.getElementById('post-list');
            
            try {
                // Since this is GitHub Pages, we can try to fetch the directory listing via GitHub API
                // Note: For public repos, this works without a token.
                const response = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/posts?ref=${CONFIG.branch}`);
                
                if (!response.ok) {
                    // Fallback if API fails or repo is private
                    throw new Error('API_ACCESS_DENIED');
                }

                const files = await response.json();
                
                // Filter for .md files and sort descending (newest first)
                const mdFiles = files
                    .filter(file => file.name.endsWith('.md'))
                    .sort((a, b) => b.name.localeCompare(a.name));

                if (mdFiles.length === 0) {
                    postListElement.innerHTML = '<li>[ NO_LOGS_FOUND ]</li>';
                    return;
                }

                const urlParams = new URLSearchParams(window.location.search);
                const currentPost = urlParams.get('post');

                postListElement.innerHTML = mdFiles.map(file => {
                    const postName = file.name.replace('.md', '');
                    const isActive = currentPost === postName || (!currentPost && file === mdFiles[0]);
                    return `
                        <li>
                            <a href="?post=${postName}" class="${isActive ? 'active' : ''}">
                                ${formatFilename(file.name)}
                            </a>
                        </li>
                    `;
                }).join('');

                // Load the first post if none selected
                if (!currentPost && mdFiles.length > 0) {
                    loadMarkdown(mdFiles[0].name.replace('.md', ''));
                } else if (currentPost) {
                    loadMarkdown(currentPost);
                }

            } catch (err) {
                console.error('Sidebar fetch error:', err);
                postListElement.innerHTML = `
                    <li style="color: #ff4d4d; font-size: 0.7rem;">[ ERROR: API_OFFLINE ]</li>
                    <li style="font-size: 0.6rem; opacity: 0.5; margin-top: 10px;">
                        PLEASE UPDATE CONFIG IN index.html:<br>
                        OWNER: ${CONFIG.owner}<br>
                        REPO: ${CONFIG.repo}
                    </li>
                `;
                // If API fails, try to load the default post anyway
                const urlParams = new URLSearchParams(window.location.search);
                loadMarkdown(urlParams.get('post') || 'phalanx_intel_20260406_0855');
            }
        }

        async function loadMarkdown(postName) {
            const contentDiv = document.getElementById('markdown-content');
            
            try {
                const response = await fetch(`posts/${postName}.md`);
                if (!response.ok) throw new Error('FILE_NOT_FOUND');
                
                const text = await response.text();
                let html = marked.parse(text);

                // Apply Phalanx thoughts styling
                html = html.replace(/<p><strong>Phalanx thoughts:<\/strong>(.*?)<\/p>/g, 
                    '<div class="phalanx-callout"><strong>Phalanx thoughts:</strong>$1</div>');

                contentDiv.innerHTML = html;
                
                const h1 = document.querySelector('#markdown-content h1');
                if (h1) document.title = `PHALANX // ${h1.innerText}`;

            } catch (err) {
                contentDiv.innerHTML = `
                    <div style="font-family: var(--font-mono); color: #ff4d4d; border: 1px solid #ff4d4d; padding: 2rem; border-radius: 8px;">
                        [ ERROR: DATA STREAM FAILURE ]<br>
                        > ${err.message}<br>
                        > TARGET: posts/${postName}.md
                    </div>
                `;
            }
        }

        window.onload = fetchPostList;
    </script>
</body>
</html>
