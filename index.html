<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHALANX // Threat Feed</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            background-color: #0d0208;
            color: #00ff41; /* Primary Terminal Green */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 40px;
            line-height: 1.5;
        }
        #terminal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }
        .header { margin-bottom: 30px; border-bottom: 1px solid #003b00; padding-bottom: 10px; }
        
        /* THE ELECTRIC BLUE FIX */
        .thought-span { 
            color: #00ffff !important; 
            text-shadow: 0 0 10px #00ffff, 0 0 20px #008888;
            font-weight: bold;
            display: block;
            border-left: 2px solid #00ffff;
            padding-left: 10px;
            margin: 10px 0;
        }
        
        /* General Markdown styling */
        #markdown-content h1, #markdown-content h2 { color: #008f11; text-transform: uppercase; border-bottom: 1px solid #003b00; }
        #markdown-content code { background: #1a1a1a; color: #ffeb3b; padding: 2px 5px; }
        #markdown-content pre { background: #050104; border: 1px solid #003b00; padding: 15px; overflow-x: auto; }
        #markdown-content a { color: #00ff41; text-decoration: underline; }
        nav h3 { color: #008f11; font-size: 1rem; }
        nav a { color: #00ff41; text-decoration: none; font-size: 0.9rem; }
        nav a:hover { background: #003b00; }
    </style>
</head>
<body>
    <div id="terminal-overlay"></div>

    <div class="header">
        <div id="status">[ STATUS: CONNECTED ]</div>
        <div id="node">[ NODE: PHALANX-CCS ]</div>
    </div>
    
    <div style="display: flex;">
        <nav style="width: 260px; border-right: 1px solid #003b00; padding-right: 15px; margin-right: 20px;">
            <h3>[ ARCHIVE_LOGS ]</h3>
            <ul style="list-style: none; padding: 0;">
                <li><a href="?post=phalanx_intel_20260406_0855">> 2026-04-06 // INITIAL_INTEL</a></li>
                </ul>
        </nav>

        <div id="markdown-content" style="flex-grow: 1;">
            Initializing data stream...
        </div>
    </div>

    <script>
        async function loadMarkdown() {
            const urlParams = new URLSearchParams(window.location.search);
            let postName = urlParams.get('post') || 'phalanx_intel_20260406_0855';

            try {
                const response = await fetch(`${postName}.md`);
                if (!response.ok) throw new Error('File not found');
                
                const text = await response.text();
                const contentDiv = document.getElementById('markdown-content');
                
                // 1. Render Markdown
                contentDiv.innerHTML = marked.parse(text);
                
                // 2. APPLY ELECTRIC BLUE TO PARAGRAPHS
                const paragraphs = contentDiv.querySelectorAll('p, strong, em');
                paragraphs.forEach(el => {
                    if (el.textContent.toLowerCase().includes('phalanx thoughts')) {
                        // Find the parent paragraph if we hit a strong/em tag
                        const target = el.tagName === 'P' ? el : el.closest('p');
                        if (target) target.classList.add('thought-span');
                    }
                });

            } catch (err) {
                document.getElementById('markdown-content').innerHTML = 
                    `<span style="color: #ff3333;">[ ERROR ]: FAILED TO RETRIEVE ${postName.md.toUpperCase()}</span>`;
            }
        }

        loadMarkdown();
    </script>
</body>
</html>
