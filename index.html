<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHALANX // Threat Feed</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        /* CORE THEME - PURE BLACK & NEON GREEN */
        body {
            background-color: #000000;
            color: #00e676; /* Vibrant Green */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Cleaner look like the image */
            margin: 0;
            padding: 40px;
            line-height: 1.6;
        }

        /* Subtle scanline effect (optional) */
        #terminal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        .header { 
            margin-bottom: 30px; 
            padding-bottom: 10px; 
            font-family: 'Courier New', Courier, monospace;
            opacity: 0.7;
        }

        /* THE BLUE CALLOUT BOX (Phalanx thoughts) */
        /* Note: Ensure your markdown uses a specific tag or class for this */
        .thought-span, blockquote {
            background-color: #0a192f !important; /* Deep navy */
            border-left: 5px solid #1e90ff !important; /* Electric blue border */
            color: #4d94ff !important; /* Electric blue text */
            padding: 25px !important;
            margin: 35px 0;
            border-radius: 4px;
            font-weight: 500;
            display: block;
        }

        .thought-span strong, blockquote strong {
            color: #70aaff !important;
            font-weight: bold;
            text-transform: capitalize;
        }

        /* MARKDOWN CONTENT STYLING */
        #markdown-content h1, 
        #markdown-content h2 { 
            color: #00ff7f !important; /* Bright Neon Green */
            text-transform: none; 
            border-bottom: none; 
            margin-top: 40px;
            font-size: 1.8rem;
        }

        #markdown-content p {
            margin-bottom: 20px;
            font-size: 1.05rem;
        }

        #markdown-content code { 
            background: #1a1a1a; 
            color: #00ff7f; 
            padding: 2px 6px; 
            border-radius: 3px;
        }

        /* SIDEBAR STYLING */
        nav h3 { 
            color: #00ff7f; 
            font-size: 0.9rem; 
            letter-spacing: 2px;
        }
        nav ul { list-style: none; padding: 0; }
        nav li { margin-bottom: 15px; }
        nav a { 
            color: #00e676; 
            text-decoration: none; 
            font-size: 0.85rem; 
            font-family: 'Courier New', Courier, monospace;
        }
        nav a:hover { 
            color: #fff;
            text-shadow: 0 0 5px #00ff7f;
        }

        /* Status colors */
        #status { color: #00ff7f; font-weight: bold; }
    </style>
</head>
<body>
    <div id="terminal-overlay"></div>
    
    <div class="header">
        <div id="status">[ STATUS: CONNECTED ]</div>
        <div id="node">[ NODE: PHALANX-CCS ]</div>
    </div>
   
    <div style="display: flex; min-height: 80vh;">
        <nav style="width: 260px; border-right: 1px solid #1a1a1a; padding-right: 20px; margin-right: 30px;">
            <h3>ARCHIVE_LOGS</h3>
            <ul>
                <li><a href="?post=phalanx_intel_20260406_0855">> 2026-04-06 // INITIAL_INTEL</a></li>
            </ul>
        </nav>
        
        <div id="markdown-content" style="flex-grow: 1; max-width: 900px;">
            [ INITIALIZING DATA STREAM... ]
        </div>
    </div>

    <script>
        async function loadMarkdown() {
            const urlParams = new URLSearchParams(window.location.search);
            let postName = urlParams.get('post') || 'phalanx_intel_20260406_0855';
            
            try {
                const response = await fetch(`posts/${postName}.md`);
                const text = await response.text();
                
                // This converts standard markdown quotes (>) into the styled blue boxes
                const html = marked.parse(text);
                document.getElementById('markdown-content').innerHTML = html;
            } catch (err) {
                document.getElementById('markdown-content').innerHTML =
                    "<div style='color: #ff1744'>[ ERROR: DATA STREAM FAILURE - TARGET NOT FOUND ]</div>";
                console.error(err);
            }
        }

        window.onload = loadMarkdown;
    </script>
</body>
</html>
