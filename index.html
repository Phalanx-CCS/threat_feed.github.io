<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHALANX // Threat Feed</title>
    <style>
        /* This part fixes the white background */
        body {
            background-color: #0d0208; /* Deep black/green tint */
            color: #00ff41;             /* Matrix Green */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .typing-effect {
            width: 0;
            overflow: hidden;
            white-space: nowrap;
            border-right: .15em solid #00ff41;
            font-size: 1.2rem;
            animation: typing 3.5s steps(40, end) forwards, blink-caret .75s step-end infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #00ff41; } }

        /* Scanning line effect for extra "hacker" vibes */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="typing-effect">
        [PHALANX] >> Aggregated Intelligence. Building the wall between the node and the noise.
    </div>

</body>
</html>
