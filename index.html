<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHALANX // Threat Feed</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        /* CORE TERMINAL THEME */
        body {
            background-color: #000000;
            color: #00e676; /* Main Green */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px;
            line-height: 1.6;
        }

        /* HEADER & SIDEBAR */
        .header, nav {
            font-family: 'Courier New', Courier, monospace;
        }
        .header { margin-bottom: 30px; opacity: 0.8; }
        #status, #node { color: #00ff41; font-weight: bold; }

        /* THE BLUE CALLOUT BOX - THIS IS WHAT WAS MISSING */
        .phalanx-callout {
            background-color: #0a192f !important; /* Deep Navy */
            border-left: 5px solid #1e90ff !important; /* Bright Blue Edge */
            color: #4d94ff !important; /* Electric Blue Text */
            padding: 25px !important;
            margin: 35px 0 !important;
            border-radius: 4px;
            font-weight: 500;
            display: block;
        }

        /* Styling the "Phalanx thoughts:" prefix inside the blue box */
        .phalanx-callout strong:first-child {
            color: #70aaff !important;
            text-transform: capitalize;
            font-size: 1.1em;
        }

        /* MARKDOWN CONTENT */
        #markdown-content h1, #markdown-content h2 { 
            color: #00ff7f !important; /* Neon Green Headings */
            text-transform: none;
            margin-top: 40px;
        }

        #markdown-content code { 
            background: #1a1a1a; 
            color: #aaa; 
            padding: 2px 6px; 
            border-radius: 3px;
            font-family: 'Courier New', Courier, monospace;
        }

        /* SIDEBAR */
        nav { width: 260px; border-right: 1px solid #222; padding-right: 20px; margin-right: 30px; }
        nav h3 { color: #00ff7f; font-size: 0.9rem; letter-spacing: 2px; }
        nav ul { list-style: none; padding: 0; }
        nav a { color: #00e676; text-decoration: none; font-size: 0.85rem; }
        nav a:hover { color: #fff; }

        .main-layout { display: flex; min-height: 80vh; }
    </style>
</head>
<body>
    <div class="header">
        <div id="status">[ STATUS: CONNECTED ]</div>
        <div id="node">[ NODE: PHALANX-CCS ]</div>
    </div>
   
    <div class="main-layout">
        <nav>
            <h3>ARCHIVE_LOGS</h3>
            <ul>
                <li><a href="?post=phalanx_intel_20260406_0855">> 2026-04-06 // INITIAL_INTEL</a></li>
            </ul>
        </nav>
        
        <div id="markdown-content" style="flex-grow: 1; max-width: 900px;">
            [ INITIALIZING DATA STREAM... ]
        </div>
    </div>

    <script>
        async function loadMarkdown() {
            const urlParams = new URLSearchParams(window.location.search);
            let postName = urlParams.get('post') || 'phalanx_intel_20260406_0855';
            
            try {
                const response = await fetch(`posts/${postName}.md`);
                const text = await response.text();
                
                // 1. Convert Markdown to HTML
                let html = marked.parse(text);

                /* 2. THE FIX: 
                   This line looks for any paragraph starting with "Phalanx thoughts:" 
                   and wraps it in the 'phalanx-callout' class for the blue box effect.
                */
                html = html.replace(/<p><strong>Phalanx thoughts:<\/strong>(.*?)<\/p>/g, 
                    '<div class="phalanx-callout"><strong>Phalanx thoughts:</strong>$1</div>');

                document.getElementById('markdown-content').innerHTML = html;
            } catch (err) {
                document.getElementById('markdown-content').innerHTML = "[ ERROR: DATA STREAM FAILURE ]";
                console.error(err);
            }
        }

        window.onload = loadMarkdown;
    </script>
</body>
</html>
